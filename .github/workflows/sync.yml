name: sync

on:
  schedule:
    - cron: "*/5 * * * *"   # 5분마다 (GitHub 부하 시 약간 지연될 수 있음)
  workflow_dispatch: {}     # 수동 트리거도 허용

concurrency:
  group: hansolcal-sync
  cancel-in-progress: false  # 이전 실행 끝날 때까지 대기 (중복 방지)

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Write config from secret
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}
        run: |
          printf '%s' "$CONFIG_YAML" > config.yaml

      - name: Run sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: |
          for attempt in 1 2 3; do
            if python main.py; then
              exit 0
            fi
            echo "sync failed; retrying (${attempt}/3) after 60 seconds"
            sleep 60
          done
          exit 1
