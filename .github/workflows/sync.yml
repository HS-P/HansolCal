name: sync

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      run_sync:
        description: "Check this box to run sync manually."
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: hansolcal-sync
  cancel-in-progress: true

jobs:
  sync:
    if: ${{ github.event_name == 'schedule' || inputs.run_sync }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Write config from secret
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}
        run: |
          printf '%s' "$CONFIG_YAML" > config.yaml

      - name: Run sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: |
          for attempt in 1 2 3; do
            if python main.py; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              break
            fi
            echo "sync failed; retrying (${attempt}/3) after 60 seconds"
            sleep 60
          done
          exit 1
