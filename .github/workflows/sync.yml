name: sync

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      run_sync:
        description: "Check this box to run sync manually."
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: hansolcal-sync
  cancel-in-progress: true

jobs:
  sync:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Write config from secret
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}
        run: |
          printf '%s' "$CONFIG_YAML" > config.yaml

      - name: Run sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          for attempt in 1 2 3; do
            if python main.py; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              break
            fi
            echo "sync failed; retrying (${attempt}/3) after 60 seconds"
            sleep 60
          done

          if [ "$EVENT_NAME" = "schedule" ]; then
            echo "::warning::scheduled sync failed after 3 attempts; suppressing failure notification"
            {
              echo "### Scheduled sync failed after retries"
              echo ""
              echo "The scheduled run was marked successful to avoid GitHub email spam."
              echo "Run this workflow manually with run_sync=true when you want a failing status for debugging."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          exit 1
